<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>

<h1>Customer Feedback Form</h1>

<form action="thankyou.html">

    <label>Name:</label>
    <input type="text" required>

    <br><br>

    <label>Email:</label>
    <input type="email" required>

    <br><br>

    <label>Rate Our Service:</label>

    <br>

    <input type="radio" name="rating"> 1 Star
    <input type="radio" name="rating"> 2 Star
    <input type="radio" name="rating"> 3 Star
    <input type="radio" name="rating"> 4 Star
    <input type="radio" name="rating"> 5 Star

    <br><br>

    <label>Comments:</label>

    <br>

    <textarea rows="5" cols="40"></textarea>

    <br><br>

    <label>Would you recommend us?</label>

    <br>

    <input type="radio" name="recommend"> Yes
    <input type="radio" name="recommend"> No

    <br><br>

    <input type="submit" value="Submit Feedback">

    <input type="reset">

</form>

</body>
</html>
